<!doctype html>
<html lang="es" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico" />
    <title>Clickedu Pro - Inicio de Sesión</title>

    <!-- Assets locales optimizados -->
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/fonts/inter.css" />
    <script src="assets/lib/lucide.min.js"></script>

    <style>
      body {
        background-color: #f0f0f3;
        transition: background-color 0.3s ease;
      }

      .dark body {
        background-color: #000000;
      }

      /* Drag nativo de ventana */
      .drag-area {
        -webkit-app-region: drag;
      }

      .no-drag {
        -webkit-app-region: no-drag;
      }

      /* Ocultar inputs nativos */
      input[type="file"] {
        display: none;
      }

      /* Focus rings */
      .input-field {
        transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .input-field:focus-within {
        box-shadow: 0 0 0 2px rgba(26, 147, 154, 0.2);
        border-color: #1a939a;
      }

      /* Fondo abstracto sutil para el login */
      .bg-glow {
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(26, 147, 154, 0.15) 0%,
          rgba(255, 255, 255, 0) 70%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 0;
        pointer-events: none;
      }

      .dark .bg-glow {
        background: radial-gradient(
          circle,
          rgba(26, 147, 154, 0.1) 0%,
          rgba(0, 0, 0, 0) 70%
        );
      }
    </style>
  </head>

  <body
    class="text-zinc-900 dark:text-zinc-100 h-screen w-screen overflow-hidden flex items-center justify-center selection:bg-brand-500/30 selection:text-brand-900 dark:selection:text-brand-100 relative"
  >
    <!-- CONTENEDOR PRINCIPAL DE LA APP (Llenando toda la ventana) -->
    <div
      id="appContainer"
      class="w-full h-full bg-zinc-50 dark:bg-zinc-950 flex flex-col relative overflow-hidden transition-all duration-500 ease-ios"
    >
      <!-- Glow de fondo -->
      <div class="bg-glow animate-float"></div>

      <!-- CABECERA DRAGGABLE (Misma posición que dashboard.html) -->
      <header
        class="h-20 flex items-center justify-between px-8 w-full z-50 drag-area shrink-0"
      >
        <!-- Título sutil a la izquierda -->
        <div class="no-drag cursor-default select-none">
          <h1
            class="font-bold uppercase tracking-[0.2em] text-xl text-zinc-400 dark:text-zinc-500"
          >
            Clickedu <span class="text-brand-500">Pro</span>
          </h1>
        </div>

        <!-- Controles a la derecha -->
        <div class="flex items-center gap-2 no-drag">
          <button
            onclick="windowControls('minimize')"
            class="w-8 h-8 rounded-full flex items-center justify-center bg-white border border-zinc-200 text-zinc-500 transition-all hover:bg-zinc-50 shadow-sm"
            title="Minimizar"
          >
            <i data-lucide="minus" class="w-4 h-4"></i>
          </button>
          <button
            onclick="windowControls('maximize')"
            class="w-8 h-8 rounded-full flex items-center justify-center bg-white border border-zinc-200 text-zinc-500 transition-all hover:bg-zinc-100 shadow-sm"
            title="Maximizar/Restaurar"
          >
            <i data-lucide="square" class="w-3.5 h-3.5"></i>
          </button>
          <button
            onclick="windowControls('close')"
            class="w-8 h-8 rounded-full flex items-center justify-center bg-white border border-zinc-200 text-zinc-500 transition-all hover:bg-red-500 hover:text-white shadow-sm"
            title="Cerrar"
          >
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        </div>
      </header>

      <!-- ÁREA CENTRAL DE LOGIN -->
      <main class="flex-1 flex items-center justify-center p-4 z-10 relative">
        <!-- TARJETA DE LOGIN COMPACTA -->
        <div
          id="loginCard"
          class="w-full max-w-[360px] bg-white/90 dark:bg-zinc-900/90 backdrop-blur-xl rounded-3xl shadow-xl border border-zinc-200/60 dark:border-zinc-800/80 flex flex-col overflow-hidden transition-all duration-300"
        >
          <!-- Decoración sutil -->
          <div
            class="h-1.5 w-full bg-gradient-to-r from-brand-400 to-brand-600"
          ></div>

          <div class="px-8 pt-8 pb-6 flex flex-col items-center">
            <img
              src="assets/img/icon.png"
              class="w-16 h-16 object-contain mb-4 drop-shadow-md"
              alt="Clickedu Pro"
            />
            <h2
              class="text-xl font-bold tracking-tight text-zinc-900 dark:text-white"
            >
              Bienvenido
            </h2>
            <p
              class="text-xs text-zinc-500 dark:text-zinc-400 text-center mt-1"
            >
              Identifícate para comenzar a evaluar
            </p>
          </div>

          <div class="px-8 pb-8 flex flex-col gap-4">
            <form id="loginForm" class="flex flex-col gap-3">
              <!-- Inputs muy compactos -->
              <div
                class="input-field flex items-center gap-3 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl px-3.5 py-2.5 group"
              >
                <i
                  data-lucide="user"
                  class="w-4 h-4 text-zinc-400 group-focus-within:text-brand-500 transition-colors"
                ></i>
                <input
                  type="text"
                  id="userInput"
                  placeholder="Usuario"
                  class="bg-transparent border-none outline-none w-full text-sm font-medium text-zinc-900 dark:text-white placeholder-zinc-400"
                />
              </div>

              <div
                class="input-field flex items-center gap-3 bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl px-3.5 py-2.5 group relative"
              >
                <i
                  data-lucide="lock"
                  class="w-4 h-4 text-zinc-400 group-focus-within:text-brand-500 transition-colors"
                ></i>
                <input
                  type="password"
                  id="passInput"
                  placeholder="Contraseña"
                  class="bg-transparent border-none outline-none w-full text-sm font-medium text-zinc-900 dark:text-white placeholder-zinc-400 pr-8"
                />
                <button
                  type="button"
                  id="togglePassBtn"
                  class="absolute right-3 text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 transition-colors focus:outline-none"
                >
                  <i data-lucide="eye" class="w-4 h-4" id="togglePassIcon"></i>
                </button>
              </div>

              <!-- Dropzone Compacto -->
              <div class="mt-1">
                <label
                  id="dropzone"
                  class="flex flex-col items-center justify-center w-full h-20 bg-zinc-50/50 dark:bg-zinc-950/30 border-2 border-dashed border-zinc-300 dark:border-zinc-700 rounded-xl cursor-pointer hover:bg-zinc-50 dark:hover:bg-zinc-900 hover:border-brand-400 dark:hover:border-brand-500 transition-all duration-300 group"
                >
                  <div
                    class="flex items-center justify-center gap-3 w-full"
                    id="dropzoneContent"
                  >
                    <div
                      class="w-8 h-8 rounded-full bg-zinc-200 dark:bg-zinc-800 flex items-center justify-center group-hover:bg-brand-100 dark:group-hover:bg-brand-500/20 transition-colors shrink-0"
                    >
                      <i
                        data-lucide="shield-check"
                        class="w-4 h-4 text-zinc-500 dark:text-zinc-400 group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors"
                      ></i>
                    </div>
                    <div class="text-left">
                      <p
                        class="text-xs font-semibold text-zinc-700 dark:text-zinc-300"
                      >
                        Archivo de seguridad .txt
                      </p>
                      <p class="text-[10px] text-zinc-400">Clic o arrastrar</p>
                    </div>
                  </div>
                  <!-- Estado Seleccionado -->
                  <div
                    class="hidden items-center justify-center gap-2 w-full px-4"
                    id="fileSelectedState"
                  >
                    <i
                      data-lucide="file-key"
                      class="w-5 h-5 text-brand-500 shrink-0"
                    ></i>
                    <p
                      class="text-xs font-bold text-zinc-900 dark:text-white truncate max-w-[200px]"
                      id="fileNameDisplay"
                    >
                      archivo.txt
                    </p>
                  </div>
                  <input id="securityFile" type="file" accept=".txt" />
                </label>
              </div>

              <!-- Botón Submit -->
              <button
                type="submit"
                id="loginBtn"
                class="mt-3 w-full flex items-center justify-center gap-2 bg-brand-500 hover:bg-brand-600 text-white font-semibold py-3 px-4 rounded-xl transition-all duration-300 shadow-md shadow-brand-500/20 hover:shadow-lg hover:-translate-y-0.5 group"
              >
                <span id="loginBtnText" class="text-sm">Iniciar Sesión</span>
                <i
                  data-lucide="arrow-right"
                  class="w-4 h-4 group-hover:translate-x-1 transition-transform"
                  id="loginBtnIcon"
                ></i>
              </button>
            </form>

            <!-- Botón Invitado Compacto -->
            <button
              id="guestBtn"
              class="w-full flex items-center justify-center gap-2 bg-transparent hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-600 dark:text-zinc-400 text-xs font-medium py-2.5 rounded-xl transition-colors"
            >
              Continuar sin registrar
            </button>
          </div>
        </div>
      </main>
    </div>

    <!-- Sistema Toast -->
    <div
      id="toastContainer"
      class="fixed top-24 right-8 z-50 flex flex-col gap-2 pointer-events-none"
    ></div>

    <script src="js/login.js"></script>
  </body>
</html>

<!doctype html>
<html lang="es" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico" />
    <title>Clickedu - Desktop Pro</title>
    <link href="style.css" rel="stylesheet" />
    <link href="assets/fonts/inter.css" rel="stylesheet" />
    <script src="assets/lib/lucide.min.js"></script>
    <style>
      body {
        background-color: transparent;
        transition: background-color 0.3s ease;
      }

      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Clases clave para ventanas Frameless (PyWebView / Electron) */
      .drag-area {
        -webkit-app-region: drag;
      }

      .no-drag {
        -webkit-app-region: no-drag;
      }

      /* Transiciones de la App */
      .student-row {
        transition: all 0.2s ease-out;
      }

      .student-row.just-updated {
        background-color: rgba(26, 147, 154, 0.1) !important;
        transform: scale(1.01);
        z-index: 10;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      }

      .modal-overlay-enter {
        opacity: 1 !important;
      }

      .modal-content-enter {
        transform: scale(1) translateY(0) !important;
        opacity: 1 !important;
      }

      .mask-bottom {
        mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        -webkit-mask-image: linear-gradient(
          to bottom,
          black 80%,
          transparent 100%
        );
      }

      /* Estilos Perfil de Usuario */
      #logoutMenu.show {
        display: block;
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>

  <body
    class="text-zinc-900 dark:text-zinc-100 h-screen w-screen overflow-hidden selection:bg-brand-500/30 selection:text-brand-900 dark:selection:text-brand-100"
  >
    <!-- CONTENEDOR PRINCIPAL DE LA APP -->
    <!-- Ahora ocupa el 100% de la ventana nativa -->
    <div
      id="appContainer"
      class="w-full h-full bg-zinc-50 dark:bg-zinc-950 flex overflow-hidden relative transition-all duration-500 ease-ios"
    >
      <!-- BARRA LATERAL (Sidebar) -->
      <aside
        class="w-64 flex-shrink-0 bg-zinc-100/50 dark:bg-zinc-900/50 backdrop-blur-xl border-r border-zinc-200 dark:border-zinc-800 flex flex-col hidden md:flex z-20 drag-area"
      >
        <div class="p-6 flex items-center gap-3 no-drag">
          <img
            src="assets/img/icon.png"
            class="w-8 h-8 object-contain"
            alt="Clickedu Pro"
          />
          <span
            class="font-bold uppercase tracking-[0.1em] text-lg text-zinc-800 dark:text-zinc-200 leading-none"
          >
            Clickedu <span class="text-brand-500">Pro</span>
          </span>
        </div>

        <!-- Navegación de Clases -->
        <div class="flex-1 overflow-y-auto hide-scrollbar px-4 pb-4 no-drag">
          <p
            class="text-xs font-bold text-zinc-400 dark:text-zinc-500 uppercase tracking-widest mb-3 pl-2"
          >
            Mis Clases
          </p>
          <ul class="space-y-1">
            <li>
              <button
                class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-zinc-500 hover:text-zinc-900 hover:bg-zinc-200/50 dark:text-zinc-400 dark:hover:text-white dark:hover:bg-zinc-800/50 transition-all"
              >
                <span
                  class="w-2 h-2 rounded-full bg-zinc-300 dark:bg-zinc-700"
                ></span>
                1º ESO A
              </button>
            </li>
            <li>
              <!-- Elemento activo (rounded-xl) -->
              <button
                class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold bg-white dark:bg-zinc-800 text-brand-600 dark:text-brand-400 shadow-sm border border-zinc-200/50 dark:border-zinc-700/50 transition-all"
              >
                <span
                  class="w-2 h-2 rounded-full bg-brand-500 shadow-[0_0_8px_rgba(26,147,154,0.6)]"
                ></span>
                2º Bach Ciencias
              </button>
            </li>
            <li>
              <button
                class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-zinc-500 hover:text-zinc-900 hover:bg-zinc-200/50 dark:text-zinc-400 dark:hover:text-white dark:hover:bg-zinc-800/50 transition-all"
              >
                <span
                  class="w-2 h-2 rounded-full bg-zinc-300 dark:bg-zinc-700"
                ></span>
                3º ESO C
              </button>
            </li>
          </ul>
        </div>

        <!-- Acciones Inferiores (Sidebar) -->
        <div
          class="p-4 border-t border-zinc-200 dark:border-zinc-800 space-y-2 no-drag"
        >
          <button
            id="statsBtn"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200/50 dark:hover:bg-zinc-800/50 transition-all group"
          >
            <i
              data-lucide="bar-chart-2"
              class="w-4 h-4 text-zinc-400 group-hover:text-zinc-900 dark:group-hover:text-white transition-colors"
            ></i>
            Resumen
          </button>
          <button
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-zinc-600 dark:text-zinc-300 hover:bg-zinc-200/50 dark:hover:bg-zinc-800/50 transition-all group"
            onclick="document.getElementById('openCmdBtn').click()"
          >
            <i
              data-lucide="command"
              class="w-4 h-4 text-zinc-400 group-hover:text-zinc-900 dark:group-hover:text-white transition-colors"
            ></i>
            Ajustes
            <kbd
              class="ml-auto font-sans px-1.5 py-0.5 bg-zinc-200/50 dark:bg-zinc-950 rounded text-[10px] text-zinc-400 font-bold uppercase tracking-wider"
              >⌘K</kbd
            >
          </button>
        </div>
      </aside>

      <!-- ÁREA PRINCIPAL -->
      <main
        class="flex-1 min-w-0 flex flex-col h-full relative bg-white dark:bg-zinc-950/50"
      >
        <!-- Cabecera Superior -->
        <header
          class="h-20 flex items-center justify-between px-8 shrink-0 z-10 drag-area"
        >
          <div class="no-drag min-w-0 flex-1 mr-4">
            <h1
              class="text-2xl font-bold tracking-tight text-zinc-900 dark:text-white flex items-center gap-3 min-w-0"
              title="2º Bachillerato Ciencias"
            >
              <span class="truncate">2º Bachillerato Ciencias</span>
              <span
                class="text-xs font-semibold bg-zinc-100 dark:bg-zinc-800 text-zinc-500 dark:text-zinc-400 px-2.5 py-1 rounded-full shrink-0"
                >24 Alumnos</span
              >
            </h1>
          </div>

          <div class="flex items-center">
            <!-- Botones de Acción -->
            <div
              class="flex items-center gap-3 pr-6 border-r border-zinc-200 dark:border-zinc-800 no-drag"
            >
              <button id="openCmdBtn" class="hidden"></button>
              <button
                class="flex items-center gap-2 px-4 py-2 bg-brand-500 hover:bg-brand-600 text-white text-sm font-semibold rounded-xl transition-all shadow-md shadow-brand-500/20 hover:shadow-lg hover:shadow-brand-500/30 hover:-translate-y-0.5"
              >
                <i data-lucide="download" class="w-4 h-4"></i>
                <span class="hidden wide:inline">Exportar</span>
              </button>
            </div>

            <!-- WINDOW CONTROLS (Vuelven a ser circulares, rounded-full) -->
            <div class="flex items-center gap-2 pl-6 no-drag">
              <!-- Minimizar -->
              <button
                onclick="windowControls('minimize')"
                class="w-8 h-8 rounded-full flex items-center justify-center bg-zinc-100 dark:bg-zinc-800/80 text-zinc-500 dark:text-zinc-400 hover:bg-zinc-200 dark:hover:bg-zinc-700 hover:text-zinc-900 dark:hover:text-white transition-colors group"
                title="Minimizar"
              >
                <i data-lucide="minus" class="w-4 h-4"></i>
              </button>

              <!-- Maximizar / Restaurar (Morphing) -->
              <button
                onclick="windowControls('maximize')"
                class="relative w-8 h-8 rounded-full flex items-center justify-center bg-zinc-100 dark:bg-zinc-800/80 text-zinc-500 dark:text-zinc-400 hover:bg-zinc-200 dark:hover:bg-zinc-700 hover:text-zinc-900 dark:hover:text-white transition-colors group overflow-hidden"
                title="Maximizar/Restaurar"
              >
                <!-- Icono Maximizar (Cuadrado) -->
                <i
                  data-lucide="square"
                  id="iconMaximize"
                  class="absolute w-3.5 h-3.5 transition-all duration-300 transform scale-100 opacity-100"
                ></i>
                <!-- Icono Restaurar (Capas / Copy) -->
                <i
                  data-lucide="copy"
                  id="iconRestore"
                  class="absolute w-3.5 h-3.5 transition-all duration-300 transform scale-50 opacity-0"
                ></i>
              </button>

              <!-- Cerrar -->
              <button
                onclick="windowControls('close')"
                class="w-8 h-8 rounded-full flex items-center justify-center bg-zinc-100 dark:bg-zinc-800/80 text-zinc-500 dark:text-zinc-400 hover:bg-red-500 hover:text-white dark:hover:bg-red-500 transition-colors group"
                title="Cerrar"
              >
                <i data-lucide="x" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        </header>

        <!-- Lista de Alumnos -->
        <div
          class="flex-1 overflow-y-auto hide-scrollbar px-8 pb-32 mask-bottom"
        >
          <div
            class="flex items-center justify-between px-4 py-2 mb-2 text-xs font-bold text-zinc-400 uppercase tracking-widest border-b border-zinc-100 dark:border-zinc-800/50 wide:hidden"
          >
            <span class="flex-1">Alumno</span>
            <span class="w-16 flex justify-center">Evaluación</span>
          </div>
          <ul
            id="studentList"
            class="grid grid-cols-1 wide:grid-cols-2 gap-1 wide:gap-x-8"
          ></ul>
        </div>

        <!-- BARRA DE DICTADO INFERIOR -->
        <div
          class="absolute bottom-8 left-0 right-0 flex justify-center pointer-events-none z-30"
        >
          <div
            id="dictationBar"
            class="pointer-events-auto flex items-center gap-4 bg-zinc-700 dark:bg-zinc-300 text-white dark:text-zinc-900 px-6 py-3.5 rounded-full shadow-2xl shadow-zinc-900/20 dark:shadow-white/10 transition-all duration-300 ease-ios transform"
          >
            <div class="relative flex items-center justify-center w-6 h-6">
              <i
                data-lucide="mic"
                class="absolute w-5 h-5 transition-all duration-300 transform scale-100 opacity-100"
                id="micIconBar"
              ></i>
              <div
                id="listeningWaves"
                class="absolute inset-0 flex items-center justify-center gap-1 transition-all duration-300 transform scale-50 opacity-0 hidden"
              >
                <!-- Las ondas en modo oscuro cambian a zinc-900 para destacar sobre el fondo claro -->
                <div
                  class="w-1 h-3 bg-white dark:bg-zinc-900 rounded-full animate-wave"
                  style="animation-delay: 0s"
                ></div>
                <div
                  class="w-1 h-5 bg-white dark:bg-zinc-900 rounded-full animate-wave"
                  style="animation-delay: 0.1s"
                ></div>
                <div
                  class="w-1 h-3 bg-white dark:bg-zinc-900 rounded-full animate-wave"
                  style="animation-delay: 0.2s"
                ></div>
              </div>
            </div>
            <span id="dictationText" class="text-sm font-medium tracking-wide"
              >Mantén
              <kbd
                class="mx-1 px-2 py-0.5 bg-zinc-600 dark:bg-zinc-200 rounded text-xs font-sans text-zinc-200 dark:text-zinc-700 font-bold uppercase transition-colors"
                >Espacio</kbd
              >
              para evaluar</span
            >
          </div>
        </div>
      </main>
    </div>

    <!-- Toast de Notificaciones -->
    <div
      id="toastContainer"
      class="fixed top-24 right-8 flex flex-col gap-2 z-50 pointer-events-none"
    ></div>

    <!-- CMD Palette Modal (Vuelve a ser rounded-3xl por dentro) -->
    <div
      id="cmdOverlay"
      class="fixed inset-0 bg-zinc-900/20 dark:bg-zinc-900/80 backdrop-blur-sm z-[100] hidden opacity-0 transition-opacity duration-300 ease-ios flex items-start justify-center pt-[20vh] px-4 no-drag"
    >
      <div
        id="cmdModal"
        class="bg-white dark:bg-zinc-900 rounded-3xl shadow-2xl shadow-black/20 w-full max-w-xl transform scale-95 -translate-y-4 opacity-0 transition-all duration-300 ease-ios flex flex-col overflow-hidden border border-zinc-200 dark:border-zinc-800"
      >
        <div
          class="flex items-center px-5 py-4 border-b border-zinc-100 dark:border-zinc-800"
        >
          <i data-lucide="search" class="w-5 h-5 text-brand-500 mr-3"></i>
          <input
            type="text"
            id="cmdInput"
            placeholder="¿Qué necesitas hacer?"
            class="flex-1 bg-transparent border-none outline-none text-zinc-900 dark:text-white text-lg placeholder-zinc-400 font-medium"
            autocomplete="off"
          />
        </div>
        <div class="p-2 space-y-1" id="cmdList">
          <button
            class="cmd-item w-full flex items-center px-4 py-3 rounded-xl hover:bg-brand-50 dark:hover:bg-brand-500/10 text-left group transition-colors"
            data-action="toggle-theme"
          >
            <i
              data-lucide="moon"
              class="w-4 h-4 text-zinc-400 group-hover:text-brand-500 mr-4"
              id="cmdMoonIcon"
            ></i>
            <span
              class="text-zinc-700 dark:text-zinc-200 font-medium group-hover:text-brand-600 dark:group-hover:text-brand-400"
              >Alternar Tema Oscuro / Claro</span
            >
          </button>
          <div class="h-px bg-zinc-100 dark:bg-zinc-800 my-1 mx-4"></div>
          <button
            class="cmd-item w-full flex items-center px-4 py-3 rounded-xl hover:bg-brand-50 dark:hover:bg-brand-500/10 text-left group transition-colors"
            data-action="snap-left"
          >
            <i
              data-lucide="columns-2"
              class="w-4 h-4 text-zinc-400 group-hover:text-brand-500 mr-4"
            ></i>
            <span
              class="text-zinc-700 dark:text-zinc-200 font-medium group-hover:text-brand-600 dark:group-hover:text-brand-400"
              >Ajustar a la izquierda (50%)</span
            >
            <kbd class="ml-auto text-[10px] text-zinc-400 font-bold opacity-50"
              >ALT+←</kbd
            >
          </button>
          <button
            class="cmd-item w-full flex items-center px-4 py-3 rounded-xl hover:bg-brand-50 dark:hover:bg-brand-500/10 text-left group transition-colors"
            data-action="snap-right"
          >
            <i
              data-lucide="columns-2"
              class="w-4 h-4 text-zinc-400 group-hover:text-brand-500 mr-4 rotate-180"
            ></i>
            <span
              class="text-zinc-700 dark:text-zinc-200 font-medium group-hover:text-brand-600 dark:group-hover:text-brand-400"
              >Ajustar a la derecha (50%)</span
            >
            <kbd class="ml-auto text-[10px] text-zinc-400 font-bold opacity-50"
              >ALT+→</kbd
            >
          </button>
          <button
            class="cmd-item w-full flex items-center px-4 py-3 rounded-xl hover:bg-brand-50 dark:hover:bg-brand-500/10 text-left group transition-colors"
            data-action="snap-top"
          >
            <i
              data-lucide="maximize"
              class="w-4 h-4 text-zinc-400 group-hover:text-brand-500 mr-4"
            ></i>
            <span
              class="text-zinc-700 dark:text-zinc-200 font-medium group-hover:text-brand-600 dark:group-hover:text-brand-400"
              >Maximizar Ventana</span
            >
            <kbd class="ml-auto text-[10px] text-zinc-400 font-bold opacity-50"
              >ALT+↑</kbd
            >
          </button>
          <button
            class="cmd-item w-full flex items-center px-4 py-3 rounded-xl hover:bg-brand-50 dark:hover:bg-brand-500/10 text-left group transition-colors"
            data-action="snap-bottom"
          >
            <i
              data-lucide="minimize"
              class="w-4 h-4 text-zinc-400 group-hover:text-brand-500 mr-4"
            ></i>
            <span
              class="text-zinc-700 dark:text-zinc-200 font-medium group-hover:text-brand-600 dark:group-hover:text-brand-400"
              >Restaurar / Minimizar</span
            >
            <kbd class="ml-auto text-[10px] text-zinc-400 font-bold opacity-50"
              >ALT+↓</kbd
            >
          </button>

          <div class="h-px bg-zinc-100 dark:bg-zinc-800 my-1 mx-4"></div>

          <!-- Acciones de Cuenta (Dinámicas) -->
          <div id="accountActions">
            <button
              class="cmd-item w-full flex items-center px-4 py-3 rounded-xl hover:bg-brand-50 dark:hover:bg-brand-500/10 text-left group transition-colors hidden"
              id="cmdLoginBtn"
              data-action="login"
            >
              <i
                data-lucide="user-plus"
                class="w-4 h-4 text-zinc-400 group-hover:text-brand-500 mr-4"
              ></i>
              <span
                class="text-zinc-700 dark:text-zinc-200 font-medium group-hover:text-brand-600 dark:group-hover:text-brand-400"
                >Iniciar Sesión</span
              >
            </button>
            <button
              class="cmd-item w-full flex items-center px-4 py-3 rounded-xl hover:bg-red-50 dark:hover:bg-red-500/10 text-left group transition-colors hidden"
              id="cmdLogoutBtn"
              data-action="logout"
            >
              <i
                data-lucide="log-out"
                class="w-4 h-4 text-red-400 group-hover:text-red-500 mr-4"
              ></i>
              <span
                class="text-zinc-700 dark:text-zinc-200 font-medium group-hover:text-red-600 dark:group-hover:text-red-400"
                >Cerrar Sesión</span
              >
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="js/dashboard.js"></script>
  </body>
</html>
